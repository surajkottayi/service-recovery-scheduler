# CommonAPI D-Bus runtime routing.
#
# Maps a CommonAPI address (domain:interface:instance) to a concrete D-Bus
# address (bus name / object path / interface). Both the service (skeleton)
# and the clients (proxy) must be able to load this file.
#
# Set the env var at runtime, e.g.:
#   export COMMONAPI_CONFIG=$PWD/fidl/commonapi4dbus.ini
#   export COMMONAPI_DBUS_DEFAULT_CONFIG=$PWD/fidl/commonapi4dbus.ini
[default]
binding=dbus

[proxy]
default_domain=local

[local:com.bmw.recovery.RecoveryScheduler:com.bmw.recovery.RecoveryScheduler]
dbus_bus=session
dbus_connection=com.bmw.recovery.SchedulerService
dbus_object=/com/bmw/recovery/RecoveryScheduler
dbus_interface=com.bmw.recovery.RecoveryScheduler
